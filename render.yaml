services:
  - type: web
    name: agent-web
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: OPENAI_API_KEY
        sync: false
      - key: BASE_URL
        sync: false
      - key: MODEL_NAME
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: "https://api.deepseek.com/v1"
      - key: DEEPSEEK_MODEL
        value: "deepseek-chat"
